version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2024.01.1
    steps:
      - checkout
      - run:
          name: Configurar Gradle
          command: |
            chmod +x gradlew
            # Usar Gradle do sistema se disponível
            if command -v gradle &> /dev/null; then
              echo "Usando Gradle do sistema"
              gradle --version
            fi
      - run:
          name: Compilar APK Debug
          command: |
            # Tentar com gradlew, se falhar usar gradle do sistema
            ./gradlew assembleDebug --no-daemon --stacktrace || gradle assembleDebug --no-daemon --stacktrace
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apk/
      - run:
          name: Localizar APK
          command: |
            find . -name "*.apk" -type f
            ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK não encontrado"

workflows:
  version: 2
  build-apk:
    jobs:
      - build
