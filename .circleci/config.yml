version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2024.01.1
    steps:
      - checkout
      - run:
          name: Instalar Go
          command: |
            sudo apt-get update
            sudo apt-get install -y golang-go git
            go version
      - run:
          name: Compilar Xray Core
          command: |
            export PATH=$PATH:$(go env GOPATH)/bin
            go install golang.org/x/mobile/cmd/gomobile@latest
            gomobile init
            git clone --depth 1 https://github.com/XTLS/Xray-core.git /tmp/xray
            cd /tmp/xray
            gomobile bind -v -target=android -androidapi 21 -o libs/xray.aar ./core
            mkdir -p ~/project/app/libs
            cp libs/xray.aar ~/project/app/libs/
      - run:
          name: Compilar APK
          command: |
            chmod +x gradlew
            ./gradlew assembleDebug
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apk/

workflows:
  version: 2
  build:
    jobs:
      - build
