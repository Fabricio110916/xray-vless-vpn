version: 2.1

orbs:
  android: circleci/android@2.4.0

jobs:
  build-debug:
    docker:
      - image: cimg/android:2024.01.1
    steps:
      - checkout
      - run:
          name: Aceitar licenças
          command: yes | sdkmanager --licenses || true
      - run:
          name: Compilar APK Debug
          command: ./gradlew assembleDebug --stacktrace
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apks/

  build-release:
    docker:
      - image: cimg/android:2024.01.1
    steps:
      - checkout
      - run:
          name: Aceitar licenças
          command: yes | sdkmanager --licenses || true
      - run:
          name: Compilar APK Release
          command: ./gradlew assembleDebug --stacktrace
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apks/

workflows:
  version: 2
  build:
    jobs:
      - build-debug
