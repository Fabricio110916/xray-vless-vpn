version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2024.01.1
    steps:
      - checkout
      - run:
          name: Dar permissão ao gradlew
          command: chmod +x gradlew
      - run:
          name: Verificar versão do Java
          command: java -version
      - run:
          name: Compilar APK Debug
          command: ./gradlew assembleDebug --no-daemon --stacktrace
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apk/
      - run:
          name: Listar APK gerado
          command: |
            find app/build/outputs -name "*.apk" -type f

workflows:
  version: 2
  build-apk:
    jobs:
      - build
