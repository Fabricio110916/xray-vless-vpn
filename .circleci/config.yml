version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2024.01.1
    steps:
      - checkout
      - run:
          name: Baixar Xray Core
          command: |
            VERSION="26.4.25"
            BASE="https://github.com/XTLS/Xray-core/releases/download/v${VERSION}"
            mkdir -p app/src/main/jniLibs
            
            # Apenas arm64-v8a e x86_64 (as mais comuns)
            for PAIR in "arm64-v8a:Xray-android-arm64-v8a.zip" "x86_64:Xray-android-amd64.zip"; do
              ARCH="${PAIR%%:*}"
              ZIP="${PAIR##*:}"
              echo "Baixando $ARCH..."
              wget -q "${BASE}/${ZIP}" -O /tmp/xray.zip 2>/dev/null
              if [ -f /tmp/xray.zip ]; then
                mkdir -p /tmp/xray_extract app/src/main/jniLibs/$ARCH
                unzip -q -o /tmp/xray.zip -d /tmp/xray_extract
                find /tmp/xray_extract -type f \( -name "xray" -o -name "libxray.so" \) -exec cp {} app/src/main/jniLibs/$ARCH/libxray.so \;
                echo "  ✅ $ARCH"
              fi
            done
            find app/src/main/jniLibs -name "*.so" -exec ls -lh {} \;
      - run:
          name: Compilar APK
          command: |
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon --stacktrace
      - run:
          name: Resultado
          command: |
            find app/build/outputs -name "*.apk" -type f -exec ls -lh {} \;
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apk/

workflows:
  version: 2
  build:
    jobs:
      - build
