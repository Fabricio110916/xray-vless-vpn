version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2024.01.1
    steps:
      - checkout
      - run:
          name: Baixar Xray Core pré-compilado
          command: |
            mkdir -p app/libs
            
            # Baixar Xray Core Android (versão mais recente)
            XRAY_VERSION="1.8.23"
            
            echo "Baixando Xray Core v${XRAY_VERSION}..."
            
            # URLs das bibliotecas por arquitetura
            BASE_URL="https://github.com/XTLS/Xray-core/releases/download/v${XRAY_VERSION}"
            
            # Baixar para cada arquitetura e criar estrutura
            for ARCH in armeabi-v7a arm64-v8a x86 x86_64; do
              mkdir -p app/src/main/jniLibs/$ARCH
              
              case $ARCH in
                armeabi-v7a)
                  ZIP="Xray-android-arm32-v7a.zip"
                  ;;
                arm64-v8a)
                  ZIP="Xray-android-arm64-v8a.zip"
                  ;;
                x86)
                  ZIP="Xray-android-x86.zip"
                  ;;
                x86_64)
                  ZIP="Xray-android-x86_64.zip"
                  ;;
              esac
              
              echo "Baixando $ARCH..."
              wget -q "${BASE_URL}/${ZIP}" -O /tmp/${ZIP} || {
                echo "Falha ao baixar $ZIP, tentando URL alternativa..."
                wget -q "https://github.com/xtls/xray-core/releases/download/v${XRAY_VERSION}/${ZIP}" -O /tmp/${ZIP}
              }
              
              if [ -f "/tmp/${ZIP}" ]; then
                unzip -q -o /tmp/${ZIP} -d /tmp/xray_${ARCH}
                cp /tmp/xray_${ARCH}/libxray.so app/src/main/jniLibs/$ARCH/ 2>/dev/null || true
                echo "✅ $ARCH OK"
              else
                echo "⚠️  $ARCH indisponivel"
              fi
            done
            
            # Verificar
            echo ""
            echo "Bibliotecas disponiveis:"
            find app/src/main/jniLibs -name "*.so" -type f
      - run:
          name: Compilar APK
          command: |
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon
      - run:
          name: Verificar APK gerado
          command: |
            echo "APKs gerados:"
            find app/build/outputs -name "*.apk" -type f -exec ls -lh {} \;
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apk/
      - run:
          name: Listar conteúdo do APK
          command: |
            APK=$(find app/build/outputs -name "*.apk" | head -1)
            if [ -f "$APK" ]; then
              echo "APK: $APK"
              unzip -l "$APK" | grep "\.so" || echo "Nenhum .so encontrado no APK"
            fi

workflows:
  version: 2
  build:
    jobs:
      - build
