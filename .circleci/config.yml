version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2024.01.1
    steps:
      - checkout
      - run:
          name: Setup
          command: |
            chmod +x gradlew
            yes | sdkmanager --licenses || true
      - run:
          name: Compilar APK
          command: ./gradlew assembleDebug --no-daemon
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apk/

workflows:
  version: 2
  build:
    jobs:
      - build
