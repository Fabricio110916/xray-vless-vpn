version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2024.01.1
    steps:
      - checkout
      - run:
          name: Baixar Xray Core v26.4.25
          command: |
            VERSION="26.4.25"
            BASE_URL="https://github.com/XTLS/Xray-core/releases/download/v${VERSION}"
            mkdir -p app/src/main/jniLibs
            
            # Mapeamento de arquiteturas
            declare -A ARCHS
            ARCHS["arm64-v8a"]="Xray-android-arm64-v8a.zip"
            ARCHS["x86_64"]="Xray-android-amd64.zip"
            ARCHS["armeabi-v7a"]="Xray-linux-arm32-v7a.zip"
            ARCHS["x86"]="Xray-linux-32.zip"
            
            for ARCH in "${!ARCHS[@]}"; do
              ZIP="${ARCHS[$ARCH]}"
              echo "Baixando $ARCH: $ZIP"
              
              wget -q "${BASE_URL}/${ZIP}" -O /tmp/${ZIP} 2>/dev/null
              
              if [ -f "/tmp/${ZIP}" ]; then
                mkdir -p /tmp/xray_${ARCH}
                unzip -q -o /tmp/${ZIP} -d /tmp/xray_${ARCH} 2>/dev/null
                
                # Procurar binário xray
                XRAY=$(find /tmp/xray_${ARCH} -type f \( -name "xray" -o -name "libxray.so" \) | head -1)
                
                if [ -n "$XRAY" ]; then
                  mkdir -p app/src/main/jniLibs/$ARCH
                  cp "$XRAY" "app/src/main/jniLibs/$ARCH/libxray.so"
                  chmod +x "app/src/main/jniLibs/$ARCH/libxray.so"
                  echo "  ✅ $ARCH OK"
                else
                  echo "  ⚠️  Binário não encontrado no zip"
                fi
              else
                echo "  ⚠️  Download falhou"
              fi
            done
            
            echo ""
            echo "Bibliotecas disponíveis:"
            find app/src/main/jniLibs -name "*.so" -type f -exec ls -lh {} \;
      - run:
          name: Compilar APK
          command: |
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon
      - run:
          name: Verificar APK
          command: |
            echo "APKs gerados:"
            find app/build/outputs -name "*.apk" -type f -exec ls -lh {} \;
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apk/

workflows:
  version: 2
  build:
    jobs:
      - build
